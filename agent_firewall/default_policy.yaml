# Default agent-firewall policy. Copy this file, edit, and pass with
# `agent-firewall serve --config my_policy.yaml` to customize.

server:
  host: "127.0.0.1"     # bind to loopback by default
  port: 8787
  auth_token: null      # set (or export FIREWALL_AUTH_TOKEN) to require x-firewall-token

upstream:
  base_url: "https://api.anthropic.com"
  timeout_seconds: 600

openai_upstream:                       # for the OpenAI-compatible shim (/v1/chat/completions)
  base_url: "https://api.openai.com"   # Ollama: http://localhost:11434  ·  vLLM/LM Studio also work
  timeout_seconds: 600

gemini_upstream:                       # for the native Gemini shim (/v1beta/models/...:generateContent)
  base_url: "https://generativelanguage.googleapis.com"
  timeout_seconds: 600

pii:
  enabled: true
  categories: []        # empty == all known categories
  action: mask          # mask | block | require_approval | allow
  scan_output: true     # also mask PII in the model's reply

injection:
  enabled: true
  scan_tool_results_only: true
  block_threshold: 5
  review_threshold: 3
  aggregate_per_request: true   # sum score across blocks (defeats split payloads)

judge:
  enabled: false        # opt-in LLM second-stage classifier (needs API key, adds latency/cost)
  model: "claude-haiku-4-5"
  injection: escalate   # off | escalate | always
  actions: escalate     # off | escalate | always
  max_chars: 4000
  timeout_seconds: 20
  fail_closed: false    # on judge error: require_approval (true) or allow (false)
  cache: true

approval:
  mode: console         # console | auto_allow | auto_deny
  timeout_seconds: 120

actions:
  enabled: true
  # Set default_action to require_approval (or block) for allowlist mode:
  # every tool not listed in `allowlist` (and not matched by a rule) is gated.
  default_action: allow
  allowlist: []         # regexes of always-safe tool names, e.g. ["^get_.*", "^read_.*"]
  rules:
    # Catches dangerous intent expressed in ARGS regardless of tool name,
    # e.g. a generic tool {"name":"fs_op","input":{"op":"delete"}}.
    - name: "destructive-op-in-args"
      tool_pattern: ".*"
      arg_patterns:
        - "(?i)\"(op|operation|action|method|cmd|verb)\"\\s*:\\s*\"(delete|destroy|remove|drop|truncate|wipe|purge|erase)\""
      action: require_approval
      severity: high
      reason: "Destructive operation specified in arguments"

    - name: "filesystem-destructive"
      tool_pattern: "(?i)(delete|remove|rm|unlink|rmdir|truncate|drop).*file|.*file.*(delete|remove)|^(rm|delete_file|remove_file|unlink)$"
      action: require_approval
      severity: high
      reason: "Destructive filesystem operation"

    - name: "shell-execution"
      tool_pattern: "(?i)^(bash|shell|exec|run_command|execute|terminal|subprocess)$"
      action: require_approval
      severity: high
      reason: "Arbitrary command execution"

    - name: "shell-dangerous-args"
      tool_pattern: "(?i)(bash|shell|exec|command|terminal)"
      arg_patterns:
        - "rm\\s+-rf"
        - ":\\(\\)\\s*\\{.*\\}"        # fork bomb
        - "mkfs|dd\\s+if=|>\\s*/dev/sd"
        - "curl[^|]*\\|\\s*(sh|bash)"   # curl | sh
      action: block
      severity: critical
      reason: "Known-dangerous shell command pattern"

    - name: "money-transfer"
      tool_pattern: "(?i)(transfer|payment|pay|charge|refund|wire|send_money|checkout|invoice)"
      action: require_approval
      severity: critical
      reason: "Financial transaction"

    - name: "outbound-email"
      tool_pattern: "(?i)(send_email|send_mail|email_send|smtp|sendgrid|send_message|send_sms)"
      action: require_approval
      severity: high
      reason: "Outbound message to a third party"

    - name: "secrets-access"
      tool_pattern: "(?i)(env|secret|credential|vault|keychain|getenv)"
      action: require_approval
      severity: high
      reason: "Access to secrets/credentials"

    - name: "external-http-write"
      tool_pattern: "(?i)(http_post|http_put|http_delete|post_request|api_call|webhook)"
      action: require_approval
      severity: medium
      reason: "State-changing outbound HTTP request"

# Optional: write every decision as JSONL for audit/forensics.
audit_log: null
